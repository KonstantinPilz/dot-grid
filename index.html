<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Grid</title>
<style>
  :root {
    --bg: #e7e3d8;
    --dot: #5c5347;
    --panel-bg: rgba(255,255,255,0.65);
    --panel-fg: #2b2b2b;
    --panel-border: rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--panel-fg);
    transition: background 0.3s ease;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    display: flex;
    min-height: 100vh;
    align-items: stretch;
  }

  /* ---- Board ---- */
  #stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-width: 0;
  }
  #boardWrap {
    width: min(var(--board, 62vmin), 100%);
    max-width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg { width: 100%; height: 100%; display: block; touch-action: manipulation; }
  circle.dot { cursor: pointer; transition: r 0.18s cubic-bezier(.2,.7,.3,1), fill 0.3s ease; }
  circle.dot:hover { opacity: 0.85; }

  /* ---- Panel ---- */
  #panel {
    width: 320px;
    flex-shrink: 0;
    background: var(--panel-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-left: 1px solid var(--panel-border);
    padding: 22px 22px 40px;
    overflow-y: auto;
    max-height: 100vh;
  }
  #panel h1 {
    font-size: 17px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em;
  }
  #panel .sub { font-size: 12px; opacity: 0.6; margin: 0 0 20px; line-height: 1.5; }
  .group { margin-bottom: 20px; }
  .group > label.title {
    display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
    opacity: 0.55; margin-bottom: 8px; font-weight: 600;
  }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .row label { font-size: 13px; flex: 1; }
  .val { font-size: 12px; opacity: 0.7; min-width: 34px; text-align: right; font-variant-numeric: tabular-nums; }
  input[type=range] { flex: 1.6; accent-color: var(--dot); cursor: pointer; }
  input[type=number] {
    width: 64px; padding: 5px 7px; border: 1px solid var(--panel-border);
    border-radius: 7px; background: rgba(255,255,255,0.7); font-size: 13px; color: inherit;
  }
  input[type=color] {
    width: 38px; height: 30px; padding: 0; border: 1px solid var(--panel-border);
    border-radius: 7px; background: none; cursor: pointer;
  }
  .btn {
    appearance: none; border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.7); color: inherit;
    padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease;
  }
  .btn:hover { background: rgba(255,255,255,0.95); }
  .btn:active { transform: translateY(1px); }
  .btn.full { width: 100%; }
  .btnrow { display: flex; gap: 8px; flex-wrap: wrap; }
  .btnrow .btn { flex: 1; }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch {
    width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
    border: 2px solid rgba(0,0,0,0.15); position: relative; overflow: hidden;
  }
  .swatch::after {
    content: ""; position: absolute; right: 0; top: 0; width: 50%; height: 100%;
    background: var(--sw-dot);
  }
  .swatch { background: var(--sw-bg); }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .checkbox-row input { width: 16px; height: 16px; accent-color: var(--dot); }
  .hint { font-size: 11px; opacity: 0.5; line-height: 1.5; margin-top: 4px; }
  .gallery {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  }
  .thumb {
    position: relative; aspect-ratio: 1/1; border-radius: 7px; overflow: hidden;
    cursor: pointer; border: 1.5px solid var(--panel-border); padding: 0; background: none;
    transition: transform 0.08s ease, border-color 0.15s ease;
  }
  .thumb:hover { transform: scale(1.06); border-color: var(--dot); }
  .thumb.active { border-color: var(--dot); border-width: 2px; }
  .thumb svg { display: block; width: 100%; height: 100%; }
  .thumb .tname {
    position: absolute; left: 0; right: 0; bottom: 0;
    font-size: 8px; line-height: 1.3; padding: 2px 3px; text-align: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.55)); color: #fff;
    opacity: 0; transition: opacity 0.15s ease; pointer-events: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .thumb:hover .tname { opacity: 1; }

  /* mobile */
  #panelToggle {
    display: none; position: fixed; top: 14px; right: 14px; z-index: 20;
  }
  @media (max-width: 820px) {
    #app { flex-direction: column; }
    #panel {
      width: 100%; border-left: none; border-top: 1px solid var(--panel-border);
      max-height: none;
    }
    #boardWrap { width: min(92vw, 92vmin); }
    #panel.collapsed { display: none; }
    #panelToggle { display: block; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <div id="boardWrap"><svg id="board" xmlns="http://www.w3.org/2000/svg"></svg></div>
  </div>

  <button id="panelToggle" class="btn">Settings</button>

  <aside id="panel">
    <h1>Dot Grid</h1>
    <p class="sub">Click a dot to grow it one step. At the last step dots touch their neighbors. One more click resets it.</p>

    <div class="group">
      <label class="title">Patterns</label>
      <div id="gallery" class="gallery"></div>
      <p class="hint">Load a flowing pattern, then tweak or click individual dots.</p>
    </div>

    <div class="group">
      <label class="title">Grid</label>
      <div class="row">
        <label for="size">Dots per side</label>
        <input type="number" id="size" min="1" max="40" step="1" value="6">
      </div>
      <div class="row">
        <label for="steps">Growth steps</label>
        <input type="number" id="steps" min="1" max="20" step="1" value="6">
      </div>
    </div>

    <div class="group">
      <label class="title">Colors</label>
      <div class="row">
        <label for="bgColor">Background</label>
        <input type="color" id="bgColor" value="#e7e3d8">
      </div>
      <div class="row">
        <label for="dotColor">Dots</label>
        <input type="color" id="dotColor" value="#5c5347">
      </div>
      <div class="btnrow" style="margin-bottom:10px">
        <button class="btn" id="themeLight">Black / White</button>
        <button class="btn" id="themeDark">White / Black</button>
        <button class="btn" id="swapColors">Swap</button>
      </div>
      <label class="title" style="margin-top:6px">Presets</label>
      <div class="swatches" id="swatches"></div>
    </div>

    <div class="group">
      <label class="title">Shape</label>
      <div class="row">
        <label for="board">Board size</label>
        <input type="range" id="board" min="30" max="92" step="1" value="62">
        <span class="val" id="boardVal">62%</span>
      </div>
      <div class="row">
        <label for="baseSize">Base dot size</label>
        <input type="range" id="baseSize" min="2" max="40" step="1" value="14">
        <span class="val" id="baseSizeVal">14%</span>
      </div>
      <div class="row">
        <label for="gap">Touch gap</label>
        <input type="range" id="gap" min="0" max="50" step="1" value="0">
        <span class="val" id="gapVal">0%</span>
      </div>
      <div class="row">
        <label for="pad">Margin</label>
        <input type="range" id="pad" min="0" max="40" step="1" value="6">
        <span class="val" id="padVal">6%</span>
      </div>
      <div class="checkbox-row" style="margin-top:6px">
        <input type="checkbox" id="square">
        <label for="square" style="flex:0 0 auto">Square dots</label>
      </div>
    </div>

    <div class="group">
      <label class="title">Actions</label>
      <div class="btnrow" style="margin-bottom:8px">
        <button class="btn" id="reset">Clear</button>
        <button class="btn" id="fill">Fill all</button>
        <button class="btn" id="random">Random</button>
      </div>
      <div class="btnrow">
        <button class="btn" id="downloadSvg">Save SVG</button>
        <button class="btn" id="downloadPng">Save PNG</button>
      </div>
      <p class="hint">Tip: hold Shift and click a dot to shrink it one step instead of grow.</p>
    </div>
  </aside>
</div>

<script>
(() => {
  const SVGNS = "http://www.w3.org/2000/svg";
  const board = document.getElementById("board");

  // ---- Curated flowy pattern library (20) ----
  const PATTERNS = [{"name":"Tidal","n":13,"steps":6,"code":"(x,y,n,s)=>{ const u=x/(n-1), v=y/(n-1); const f=(Math.sin(u*Math.PI*2 - v*1.5)+1)/2; return Math.max(0,Math.min(s,Math.round(f*s))); }"},{"name":"Deep Current","n":13,"steps":6,"code":"(x,y,n,s)=>{ const u=x/(n-1), v=y/(n-1); const f=(Math.sin((u+0.3*Math.sin(v*Math.PI*2))*Math.PI*4)+1)/2; return Math.max(0,Math.min(s,Math.round(f*s))); }"},{"name":"Corner Wake","n":13,"steps":6,"code":"(x,y,n,s)=>{ const r=Math.hypot(x,y); const f=(Math.sin(r*1.5)+1)/2; return Math.max(0,Math.min(s,Math.round(f*s))); }"},{"name":"Chevron Sea","n":13,"steps":6,"code":"(x,y,n,s)=>{ const cx=(n-1)/2; const d=Math.abs(x-cx)+y; const f=(Math.sin(d*0.9)+1)/2; return Math.max(0,Math.min(s,Math.round(f*s))); }"},{"name":"Maelstrom","n":13,"steps":6,"code":"(x,y,n,s)=>{ const cx=(n-1)/2, cy=(n-1)/2; const a=Math.atan2(y-cy,x-cx); const r=Math.hypot(x-cx,y-cy); const f=(Math.sin(a*2 - r*1.5)+1)/2; return Math.max(0,Math.min(s,Math.round(f*s))); }"},{"name":"Solitary","n":13,"steps":6,"code":"(x,y,n,s)=>{const cx=n*0.48,cy=n*0.52,sig=n*0.27;const d2=(x-cx)**2+(y-cy)**2;const v=s*Math.exp(-d2/(2*sig*sig));return Math.max(0,Math.min(s,Math.round(v)));}"},{"name":"Twin Fusion","n":13,"steps":6,"code":"(x,y,n,s)=>{const B=[[0.38,0.5,0.2],[0.62,0.5,0.2]];let f=0;for(const[fx,fy,fr]of B){const bx=fx*n,by=fy*n,r=fr*n;const d=Math.hypot(x-bx,y-by);f+=r*r/(d*d+0.7);}return Math.max(0,Math.min(s,Math.round(f*1.7)));}"},{"name":"Halo","n":13,"steps":6,"code":"(x,y,n,s)=>{const cx=n*0.5,cy=n*0.5;const d=Math.hypot(x-cx,y-cy);const ring=Math.exp(-((d-n*0.3)**2)/(2*(n*0.12)**2));return Math.max(0,Math.min(s,Math.round(ring*s)));}"},{"name":"Soft Crescent","n":13,"steps":6,"code":"(x,y,n,s)=>{const c1x=n*0.45,c1y=n*0.5,c2x=n*0.62,c2y=n*0.45;const sig=n*0.3;const a=Math.exp(-((x-c1x)**2+(y-c1y)**2)/(2*sig*sig));const b=0.85*Math.exp(-((x-c2x)**2+(y-c2y)**2)/(2*(n*0.22)**2));return Math.max(0,Math.min(s,Math.round((a-b+0.15)*s*1.3)));}"},{"name":"Plume","n":13,"steps":6,"code":"(x,y,n,s)=>{const bx=n*0.5;const sig=n*(0.16+0.012*y);const v=s*Math.exp(-((x-bx)**2)/(2*sig*sig))*Math.exp(-Math.abs(y-n*0.55)/(n*0.6));return Math.max(0,Math.min(s,Math.round(v*1.4)));}"},{"name":"Loose Galaxy","n":15,"steps":6,"code":"(x,y,n,s)=>{const cx=(n-1)/2,cy=(n-1)/2,dx=x-cx,dy=y-cy,r=Math.hypot(dx,dy)+1e-6,a=Math.atan2(dy,dx);const f=(Math.sin(a*2+Math.log(r+1)*4)+1)/2,env=Math.exp(-r/(n*0.5));const v=f*env*s;return Math.max(0,Math.min(s,Math.round(v)));}"},{"name":"Whirlpool","n":15,"steps":6,"code":"(x,y,n,s)=>{const cx=(n-1)/2,cy=(n-1)/2,dx=x-cx,dy=y-cy,r=Math.hypot(dx,dy)+1e-6,a=Math.atan2(dy,dx);const f=(Math.sin(a*1+r*r*0.06)+1)/2,env=Math.exp(-r/(n*0.6));const v=f*env*s;return Math.max(0,Math.min(s,Math.round(v)));}"},{"name":"Quad Swirl","n":13,"steps":6,"code":"(x,y,n,s)=>{const cx=(n-1)/2,cy=(n-1)/2,dx=x-cx,dy=y-cy,r=Math.hypot(dx,dy)+1e-6,a=Math.atan2(dy,dx);const f=(Math.sin(a*4+r*1.3)+1)/2,env=1-Math.abs(r-n*0.3)/(n*0.4);const v=f*Math.max(0,env)*s;return Math.max(0,Math.min(s,Math.round(v)));}"},{"name":"Diagonal Ramp","n":13,"steps":6,"code":"(x,y,n,s)=>{const u=x/(n-1),v=y/(n-1);return Math.max(0,Math.min(s,Math.round((u+v)/2*s)));}"},{"name":"Dome","n":13,"steps":6,"code":"(x,y,n,s)=>{const u=x/(n-1)-0.5,v=y/(n-1)-0.5;let d=Math.sqrt(u*u+v*v)/0.707;return Math.max(0,Math.min(s,Math.round((1-d)*s)));}"},{"name":"Drape","n":13,"steps":6,"code":"(x,y,n,s)=>{const u=x/(n-1),v=y/(n-1);let f=(Math.sin((u+v)*Math.PI*2.5)+1)/2;return Math.max(0,Math.min(s,Math.round(f*s)));}"},{"name":"Cresting Dunes","n":13,"steps":6,"code":"(x,y,n,s)=>{const u=x/(n-1),v=y/(n-1);let f=(Math.sin((u+v*0.5)*Math.PI*2.2)+1)/2;return Math.max(0,Math.min(s,Math.round(f*s)));}"},{"name":"Flowing Warp","n":13,"steps":6,"code":"(x,y,n,s)=>{const u=x/(n-1),v=y/(n-1);let f=(u+v)/2+0.18*Math.sin(v*Math.PI*3);return Math.max(0,Math.min(s,Math.round(f*s)));}"},{"name":"Marble Veins","n":13,"steps":6,"code":"(x,y,n,s)=>{const wx=x+3*Math.sin(y*0.45);const v=Math.abs(Math.sin(wx*0.5+y*0.2));return Math.max(0,Math.min(s,Math.round((1-v)*s)));}"},{"name":"Drifting Smoke","n":15,"steps":6,"code":"(x,y,n,s)=>{const wy=y+2.5*Math.sin(x*0.35);const f=Math.sin(x*0.4+wy*0.3)+0.5*Math.cos(wy*0.6+1)+0.3*Math.sin(x*0.9+2);return Math.max(0,Math.min(s,Math.round((f/1.8/2+0.5)*s)));}"}];
  PATTERNS.forEach(p => { try { p.fn = (0, eval)('(' + p.code + ')'); } catch (e) { p.fn = () => 0; } });

  const state = {
    size: 6,
    steps: 6,
    base: 0.14,   // base dot diameter as fraction of cell
    gap: 0.0,     // gap at full size, fraction of cell (0 = touching)
    pad: 0.06,    // outer margin as fraction of cell
    square: false,
    dotColor: "#5c5347",
    bgColor: "#e7e3d8",
    levels: [],   // per-cell current level 0..steps
  };

  // ---------- geometry / rendering ----------
  function levelToFraction(level) {
    // diameter fraction of a cell at this level.
    // level 0 -> base ; level steps -> (1 - gap) (so dots just touch, minus gap)
    const maxFrac = 1 - state.gap;
    if (state.steps === 0) return state.base;
    return state.base + (level / state.steps) * (maxFrac - state.base);
  }

  function ensureLevels() {
    const n = state.size * state.size;
    if (state.levels.length !== n) state.levels = new Array(n).fill(0);
  }

  function build() {
    ensureLevels();
    const n = state.size;
    const pad = state.pad;             // in cell units
    const view = n + pad * 2;          // total viewBox in cell units
    board.setAttribute("viewBox", `0 0 ${view} ${view}`);
    board.innerHTML = "";

    // background rect
    const bg = document.createElementNS(SVGNS, "rect");
    bg.setAttribute("x", 0); bg.setAttribute("y", 0);
    bg.setAttribute("width", view); bg.setAttribute("height", view);
    bg.setAttribute("fill", state.bgColor);
    bg.setAttribute("id", "bgRect");
    board.appendChild(bg);

    for (let row = 0; row < n; row++) {
      for (let col = 0; col < n; col++) {
        const idx = row * n + col;
        const cx = pad + col + 0.5;
        const cy = pad + row + 0.5;
        let el;
        if (state.square) {
          el = document.createElementNS(SVGNS, "rect");
          el.setAttribute("rx", 0.04);
        } else {
          el = document.createElementNS(SVGNS, "circle");
        }
        el.setAttribute("class", "dot");
        el.setAttribute("fill", state.dotColor);
        el.dataset.idx = idx;
        el.dataset.cx = cx;
        el.dataset.cy = cy;
        board.appendChild(el);
      }
    }
    paint();
  }

  function paint() {
    const dots = board.querySelectorAll(".dot");
    dots.forEach(el => {
      const idx = +el.dataset.idx;
      const cx = +el.dataset.cx, cy = +el.dataset.cy;
      const d = levelToFraction(state.levels[idx]); // diameter in cell units
      el.setAttribute("fill", state.dotColor);
      if (el.tagName === "circle") {
        el.setAttribute("cx", cx);
        el.setAttribute("cy", cy);
        el.setAttribute("r", d / 2);
      } else {
        el.setAttribute("x", cx - d / 2);
        el.setAttribute("y", cy - d / 2);
        el.setAttribute("width", d);
        el.setAttribute("height", d);
      }
    });
    document.getElementById("bgRect").setAttribute("fill", state.bgColor);
  }

  // ---------- interaction ----------
  board.addEventListener("click", (e) => {
    const el = e.target.closest(".dot");
    if (!el) return;
    const idx = +el.dataset.idx;
    if (e.shiftKey) {
      state.levels[idx] = (state.levels[idx] - 1 + (state.steps + 1)) % (state.steps + 1);
    } else {
      state.levels[idx] = (state.levels[idx] + 1) % (state.steps + 1);
    }
    paint();
  });

  // ---------- controls ----------
  const $ = id => document.getElementById(id);

  $("size").addEventListener("input", e => {
    let v = Math.max(1, Math.min(40, parseInt(e.target.value) || 1));
    state.size = v; state.levels = []; build(); clearActive();
  });
  $("steps").addEventListener("input", e => {
    let v = Math.max(1, Math.min(20, parseInt(e.target.value) || 1));
    state.steps = v;
    // clamp existing levels
    state.levels = state.levels.map(l => Math.min(l, v));
    paint(); clearActive();
  });
  $("dotColor").addEventListener("input", e => { state.dotColor = e.target.value; paint(); refreshThumbs(); });
  $("bgColor").addEventListener("input", e => {
    state.bgColor = e.target.value; document.body.style.setProperty("--bg", e.target.value); paint(); refreshThumbs();
  });

  function setColors(bg, dot) {
    state.bgColor = bg; state.dotColor = dot;
    $("bgColor").value = bg; $("dotColor").value = dot;
    document.body.style.setProperty("--bg", bg);
    document.body.style.setProperty("--dot", dot);
    paint(); refreshThumbs();
  }
  $("themeLight").addEventListener("click", () => setColors("#ffffff", "#000000"));
  $("themeDark").addEventListener("click", () => setColors("#000000", "#ffffff"));
  $("swapColors").addEventListener("click", () => setColors(state.dotColor, state.bgColor));

  $("board").addEventListener("input", e => {
    document.documentElement.style.setProperty("--board", e.target.value + "vmin");
    $("boardVal").textContent = e.target.value + "%";
  });
  $("baseSize").addEventListener("input", e => {
    state.base = e.target.value / 100; $("baseSizeVal").textContent = e.target.value + "%"; paint();
  });
  $("gap").addEventListener("input", e => {
    state.gap = e.target.value / 100; $("gapVal").textContent = e.target.value + "%"; paint();
  });
  $("pad").addEventListener("input", e => {
    state.pad = e.target.value / 100; $("padVal").textContent = e.target.value + "%"; build();
  });
  $("square").addEventListener("change", e => { state.square = e.target.checked; build(); });

  $("reset").addEventListener("click", () => { state.levels = state.levels.map(() => 0); paint(); clearActive(); });
  $("fill").addEventListener("click", () => { state.levels = state.levels.map(() => state.steps); paint(); clearActive(); });
  $("random").addEventListener("click", () => {
    state.levels = state.levels.map(() => Math.floor(Math.random() * (state.steps + 1)));
    paint(); clearActive();
  });

  // ---------- presets ----------
  const presets = [
    ["#e7e3d8", "#5c5347"], // CTS
    ["#ffffff", "#000000"],
    ["#000000", "#ffffff"],
    ["#0d1b2a", "#e0e1dd"],
    ["#fef9ef", "#e63946"],
    ["#1a1423", "#f4d35e"],
    ["#022c43", "#ffd700"],
    ["#f7f7f2", "#3a86ff"],
  ];
  const sw = $("swatches");
  presets.forEach(([bg, dot]) => {
    const s = document.createElement("div");
    s.className = "swatch";
    s.style.setProperty("--sw-bg", bg);
    s.style.setProperty("--sw-dot", dot);
    s.title = `${bg} / ${dot}`;
    s.addEventListener("click", () => setColors(bg, dot));
    sw.appendChild(s);
  });

  // ---------- pattern gallery ----------
  function thumbSVG(p) {
    const n = p.n, pad = 0.5, view = n + pad * 2, base = 0.2;
    const svg = document.createElementNS(SVGNS, "svg");
    svg.setAttribute("viewBox", `0 0 ${view} ${view}`);
    const bg = document.createElementNS(SVGNS, "rect");
    bg.setAttribute("width", view); bg.setAttribute("height", view);
    bg.setAttribute("fill", state.bgColor);
    svg.appendChild(bg);
    for (let y = 0; y < n; y++) for (let x = 0; x < n; x++) {
      const lv = Math.max(0, Math.min(p.steps, Math.round(p.fn(x, y, n, p.steps))));
      const d = base + (lv / p.steps) * (1 - base);
      const c = document.createElementNS(SVGNS, "circle");
      c.setAttribute("cx", pad + x + 0.5); c.setAttribute("cy", pad + y + 0.5);
      c.setAttribute("r", d / 2); c.setAttribute("fill", state.dotColor);
      svg.appendChild(c);
    }
    return svg;
  }
  function buildGallery() {
    const g = $("gallery"); g.innerHTML = "";
    PATTERNS.forEach((p, i) => {
      const b = document.createElement("button");
      b.className = "thumb"; b.title = p.name; b.dataset.i = i;
      b.appendChild(thumbSVG(p));
      const nm = document.createElement("span");
      nm.className = "tname"; nm.textContent = p.name;
      b.appendChild(nm);
      b.addEventListener("click", () => loadPattern(i));
      g.appendChild(b);
    });
  }
  function refreshThumbs() {
    $("gallery").querySelectorAll(".thumb svg").forEach(svg => {
      svg.querySelector("rect").setAttribute("fill", state.bgColor);
      svg.querySelectorAll("circle").forEach(c => c.setAttribute("fill", state.dotColor));
    });
  }
  function clearActive() {
    $("gallery").querySelectorAll(".thumb.active").forEach(b => b.classList.remove("active"));
  }
  function loadPattern(i) {
    const p = PATTERNS[i];
    state.size = p.n; state.steps = p.steps;
    const lv = new Array(p.n * p.n);
    for (let y = 0; y < p.n; y++) for (let x = 0; x < p.n; x++)
      lv[y * p.n + x] = Math.max(0, Math.min(p.steps, Math.round(p.fn(x, y, p.n, p.steps))));
    state.levels = lv;
    $("size").value = p.n; $("steps").value = p.steps;
    build();
    $("gallery").querySelectorAll(".thumb").forEach((b, j) => b.classList.toggle("active", j === i));
  }

  // ---------- export ----------
  function svgString() {
    const clone = board.cloneNode(true);
    clone.removeAttribute("style");
    clone.setAttribute("width", 1000);
    clone.setAttribute("height", 1000);
    clone.querySelectorAll(".dot").forEach(d => d.style.cursor = "");
    return '<?xml version="1.0" encoding="UTF-8"?>\n' + clone.outerHTML;
  }
  function download(name, blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  $("downloadSvg").addEventListener("click", () => {
    download("dot-grid.svg", new Blob([svgString()], { type: "image/svg+xml" }));
  });
  $("downloadPng").addEventListener("click", () => {
    const svg = svgString();
    const img = new Image();
    const svgBlob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);
    img.onload = () => {
      const c = document.createElement("canvas");
      c.width = 2000; c.height = 2000;
      const ctx = c.getContext("2d");
      ctx.drawImage(img, 0, 0, 2000, 2000);
      URL.revokeObjectURL(url);
      c.toBlob(b => download("dot-grid.png", b), "image/png");
    };
    img.src = url;
  });

  // ---------- mobile panel ----------
  $("panelToggle").addEventListener("click", () => {
    document.getElementById("panel").classList.toggle("collapsed");
  });

  // ---------- init ----------
  document.body.style.setProperty("--bg", state.bgColor);
  document.body.style.setProperty("--dot", state.dotColor);
  buildGallery();
  build();
})();
</script>
</body>
</html>
